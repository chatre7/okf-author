<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mike Team OKF Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #fff; border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); z-index: 10; }
        #main { flex: 1; position: relative; display: flex; flex-direction: column; background: #e9ecef; }
        #graph-container { flex: 1; background: #fff; margin: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; position: relative; }
        
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        h1 { font-size: 1.4rem; color: #333; margin: 0; }
        #reset-btn { background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; display: none; }
        #reset-btn:hover { background: #0056b3; }

        .node-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; }
        .node-item:hover { background: #f8f9fa; border-left-color: #007bff; transform: translateX(5px); }
        .node-item h3 { margin: 0; font-size: 1rem; color: #007bff; }
        .node-item p { margin: 8px 0 0; font-size: 0.85rem; color: #666; line-height: 1.4; }
        .tag { display: inline-block; background: #e7f3ff; color: #007bff; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; margin-right: 6px; margin-top: 8px; font-weight: 500; }
        
        .node { stroke: #fff; stroke-width: 2px; cursor: pointer; transition: opacity 0.3s, filter 0.3s; }
        .node.broken { stroke: #dc3545; stroke-dasharray: 4; fill: #fff !important; }
        .link { stroke: #ced4da; stroke-opacity: 0.6; stroke-width: 1.5px; transition: opacity 0.3s, stroke 0.3s; }
        .link.tag { stroke: #ffc107; stroke-opacity: 0.4; }
        .link.reference { stroke: #007bff; stroke-opacity: 0.6; stroke-width: 2px; }
        .link.broken { stroke: #dc3545; stroke-opacity: 0.8; stroke-dasharray: 4; }
        .label { font-size: 12px; pointer-events: none; fill: #495057; font-weight: 500; transition: opacity 0.3s; }
        .label.broken { fill: #dc3545; font-style: italic; }

        .dimmed { opacity: 0.1 !important; filter: grayscale(1); }
        .highlight-node { stroke: #000 !important; stroke-width: 3px !important; }
        .highlight-link { stroke-opacity: 1 !important; stroke-width: 3px !important; }
        
        #node-details { position: absolute; top: 40px; right: 40px; width: 400px; background: rgba(255,255,255,0.98); padding: 25px; border-radius: 12px; border: 1px solid #dee2e6; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: none; max-height: 80vh; overflow-y: auto; z-index: 20; }
        #node-details h2 { margin-top: 0; color: #333; font-size: 1.5rem; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 0.9rem; white-space: pre-wrap; border: 1px solid #e9ecef; color: #333; line-height: 1.5; }
        .close-btn { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; float: right; margin-top: 15px; }
        .close-btn:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>Mike Team KB</h1>
            <button id="reset-btn" onclick="resetFilter()">Show All</button>
        </div>
        <div style="margin-bottom: 20px;">
            <input type="text" id="search-input" placeholder="Search title, content, tags..." 
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem;">
        </div>
        <div id="node-list">Loading nodes...</div>
    </div>
    <div id="main">
        <div id="graph-container">
            <button id="rearrange-btn" style="position: absolute; top: 15px; left: 15px; z-index: 5; background: #fff; border: 1px solid #ddd; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                🔄 Rearrange & Center
            </button>
        </div>
        <div id="node-details">
            <h2 id="details-title"></h2>
            <div id="details-tags" style="margin-bottom: 15px;"></div>
            <div id="details-content"></div>
            <button class="close-btn" onclick="closeDetails()">Close</button>
        </div>
    </div>

    <script>
        let allNodesData = [];
        let lastGraphLinks = []; // เก็บ links ล่าสุดไว้ใช้ highlight
        let simulation, svg, g, zoom;

        function loadInitialData() {
            fetch('/api/nodes')
                .then(res => res.json())
                .then(nodes => {
                    allNodesData = nodes;
                    renderSidebar(nodes);
                });
        }

        function renderSidebar(nodes) {
            const list = d3.select('#node-list');
            list.html('');
            nodes.forEach(node => {
                const item = list.append('div').attr('class', 'node-item')
                    .on('click', (event) => {
                        event.stopPropagation();
                        showDetails(node.filename);
                        clearHighlight();
                        if (lastGraphLinks.length > 0) highlightNodeConnections(node.filename, lastGraphLinks);
                    });
                item.append('h3').text(node.title);
                item.append('p').text(node.description);
                const meta = item.append('div').style('margin-top', '5px');
                meta.append('small').text(`Type: ${node.type} | Links: ${(node.links || []).length}`)
                    .style('color', '#999').style('font-size', '0.7rem');
                if (node.brokenLinks && node.brokenLinks.length > 0) {
                    meta.append('small').text(` | ⚠️ ${node.brokenLinks.length} Broken`)
                        .style('color', '#dc3545').style('font-size', '0.7rem').style('font-weight', 'bold');
                }
                const tagsContainer = item.append('div');
                (node.tags || []).forEach(tag => {
                    tagsContainer.append('span').attr('class', 'tag').text(tag);
                });
            });
        }

        const searchInput = document.getElementById('search-input');
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value;
            if (!query) { resetFilter(); return; }
            searchTimeout = setTimeout(() => {
                fetch(`/api/search?q=${encodeURIComponent(query)}`)
                    .then(res => res.json())
                    .then(results => {
                        d3.select('#reset-btn').style('display', 'block');
                        renderSidebar(results);
                    });
            }, 300);
        });

        function filterByTag(tagName) {
            d3.select('#reset-btn').style('display', 'block');
            const filtered = allNodesData.filter(n => (n.tags || []).includes(tagName));
            renderSidebar(filtered);
        }

        function resetFilter() {
            d3.select('#reset-btn').style('display', 'none');
            const input = document.getElementById('search-input');
            if (input) input.value = '';
            renderSidebar(allNodesData);
        }

        function showDetails(filename) {
            fetch(`/api/nodes/${filename}`)
                .then(res => res.json())
                .then(data => {
                    d3.select('#node-details').style('display', 'block');
                    d3.select('#details-title').text(data.metadata.title || filename);
                    d3.select('#details-content').html(`<pre>${data.content}</pre>`);
                    const tagsDiv = d3.select('#details-tags').html('');
                    (data.metadata.tags || []).forEach(tag => {
                        tagsDiv.append('span').attr('class', 'tag').text(tag);
                    });
                });
        }

        function closeDetails() { d3.select('#node-details').style('display', 'none'); }

        function clearHighlight() {
            svg.selectAll(".node, .link, .label").classed("dimmed", false);
            svg.selectAll(".link").classed("highlight-link", false);
            svg.selectAll(".node").classed("highlight-node", false);
        }

        function highlightNodeConnections(nodeId, links) {
            const connectedNodeIds = new Set([nodeId]);
            const connectedLinkIds = new Set();
            links.forEach(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                if (s === nodeId || t === nodeId) {
                    connectedNodeIds.add(s); connectedNodeIds.add(t);
                    connectedLinkIds.add(l);
                }
            });
            svg.selectAll(".node").classed("dimmed", d => !connectedNodeIds.has(d.id));
            svg.selectAll(".label").classed("dimmed", d => !connectedNodeIds.has(d.id));
            svg.selectAll(".link").classed("dimmed", l => !connectedLinkIds.has(l))
               .classed("highlight-link", l => connectedLinkIds.has(l));
            svg.selectAll(".node").filter(d => d.id === nodeId).classed("highlight-node", true);
        }

        const container = document.getElementById('graph-container');
        const width = container.clientWidth || 800;
        const height = container.clientHeight || 600;

        svg = d3.select("#graph-container").append("svg")
            .attr("width", "100%").attr("height", "100%")
            .attr("viewBox", [0, 0, width, height])
            .on("click", (e) => { if (e.target.tagName === "svg") clearHighlight(); });

        g = svg.append("g");
        zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        fetch('/api/graph')
            .then(res => res.json())
            .then(data => {
                lastGraphLinks = data.links;
                simulation = d3.forceSimulation(data.nodes)
                    .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
                    .force("charge", d3.forceManyBody().strength(-150))
                    .force("collide", d3.forceCollide().radius(d => d.type === 'tag' ? 30 : 40))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("x", d3.forceX(width / 2).strength(0.05))
                    .force("y", d3.forceY(height / 2).strength(0.05));

                const link = g.append("g").selectAll("line").data(data.links).join("line")
                    .attr("class", d => `link ${d.linkType}`);

                const typeColors = { project: "#007bff", roadmap: "#28a745", log: "#dc3545", concept: "#17a2b8", tag: "#ffc107", broken: "#fff" };

                const node = g.append("g").selectAll("circle").data(data.nodes).join("circle")
                    .attr("class", d => `node ${d.type === 'broken' ? 'broken' : ''}`)
                    .attr("r", d => d.type === 'tag' ? 8 : (d.type === 'broken' ? 6 : 14))
                    .attr("fill", d => typeColors[d.type] || "#6c757d")
                    .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended))
                    .on('click', (event, d) => {
                        event.stopPropagation(); clearHighlight();
                        highlightNodeConnections(d.id, data.links);
                        if (d.type === 'tag') filterByTag(d.title);
                        else if (d.type === 'broken') alert(`Broken Link: ${d.id}`);
                        else showDetails(d.id);
                    });

                const label = g.append("g").selectAll("text").data(data.nodes).join("text")
                    .attr("class", d => `label ${d.type === 'broken' ? 'broken' : ''}`)
                    .text(d => d.title).attr("dx", 20).attr("dy", 5);

                d3.select("#rearrange-btn").on("click", () => {
                    svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
                    simulation.alpha(0.5).restart();
                });

                simulation.on("tick", () => {
                    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                    node.attr("cx", d => d.x).attr("cy", d => d.y);
                    label.attr("x", d => d.x).attr("y", d => d.y);
                });

                function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
                function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
                function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }
            });

        loadInitialData();
    </script>
</body>
</html>
